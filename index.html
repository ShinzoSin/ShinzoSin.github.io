    <div class="honeycomb-wrap">
      <div id="honeycomb"></div>
    </div>

  </div>

  <script>
    const list = document.querySelectorAll('#source li a');
    const honey = document.getElementById('honeycomb');
    const wrap = document.querySelector('.honeycomb-wrap');

    function buildHexes() {
      honey.innerHTML = '';
      list.forEach(a => {
        const div = document.createElement('div');
        div.className = 'hex';
        div.dataset.preview = a.dataset.preview || '';

        const link = document.createElement('a');
        link.href = a.href;
        link.textContent = a.textContent;

        div.appendChild(link);
        honey.appendChild(div);
      });
      layout();
    }

    function layout() {
      const hexW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--hex-w'));
      const hexH = hexW * 0.866;
      const gap = 12;
      const tiles = honey.children;
      const cols = Math.max(1, Math.floor(wrap.clientWidth / (hexW * 0.75)));

      let maxX = 0;
      for (let i = 0; i < tiles.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = col * (hexW * 0.75 + gap/2);
        const y = row * (hexH + gap/2) + ((col % 2) * (hexH / 2));
        tiles[i].style.transform = `translate(${x}px, ${y}px)`;
        maxX = Math.max(maxX, x);
      }

      const totalRows = Math.ceil(tiles.length / cols);
      const height = totalRows * (hexH + gap/2) + hexH/2;
      const totalWidth = maxX + hexW;

      honey.style.height = height + 'px';
      honey.style.width = totalWidth + 'px';
    }

    // GIF hover swap
    honey.addEventListener('mouseenter', e => {
      const hex = e.target.closest('.hex');
      if (!hex || !hex.dataset.preview) return;
      hex.style.backgroundImage = `url('${hex.dataset.preview}')`;
    }, true);

    honey.addEventListener('mouseleave', e => {
      const hex = e.target.closest('.hex');
      if (!hex) return;
      hex.style.backgroundImage = '';
    }, true);

    window.addEventListener('resize', layout);
    buildHexes();
  </script>
