<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>

  <style>
    body {
      background-color: #111;
      color: #0f0;
      font-family: monospace;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    canvas {
      background: black;
      border: 2px solid #0f0;
      display: block;
      margin: 30px auto;
    }

    #restart-btn {
      display: none;
      background: #0f0;
      color: #111;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 10px;
    }

    #restart-btn:hover {
      background: #1fff1f;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Raleway&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">
    <a href="index.html" class="navbar-button">Home</a>
    <a href="asteroids.html" class="navbar-button">Asteroids</a>
    <a href="snake.html" class="navbar-button">Snake</a>
    <a href="moon lander.html" class="navbar-button">Moon Lander</a>
  </div>

  <h2>🐍 Snake Game (Use Arrow Keys or W A S D)</h2>
  <canvas id="game" width="400" height="400"></canvas>
  <p id="score">Score: 0</p>
  <button id="restart-btn">Restart</button>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");
    const restartBtn = document.getElementById("restart-btn");

    const cellSize = 20;
    let snake, food, direction, score, gameInterval;
    let gameSpeed = 120;
    let isGameOver = false;

    function initGame() {
      snake = [{ x: 200, y: 200 }];
      food = { x: 100, y: 100 };
      direction = "RIGHT";
      score = 0;
      isGameOver = false;
      scoreDisplay.textContent = `Score: ${score}`;
      restartBtn.style.display = "none";
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, gameSpeed);
    }

    function drawSnake() {
      ctx.fillStyle = "#0f0";
      for (const segment of snake) {
        ctx.fillRect(segment.x, segment.y, cellSize, cellSize);
      }
    }

    function drawFood() {
      ctx.fillStyle = "red";
      ctx.fillRect(food.x, food.y, cellSize, cellSize);
    }

    function moveSnake() {
      const head = { ...snake[0] };

      if (direction === "UP") head.y -= cellSize;
      else if (direction === "DOWN") head.y += cellSize;
      else if (direction === "LEFT") head.x -= cellSize;
      else if (direction === "RIGHT") head.x += cellSize;

      // Wrap around screen
      if (head.x >= canvas.width) head.x = 0;
      if (head.x < 0) head.x = canvas.width - cellSize;
      if (head.y >= canvas.height) head.y = 0;
      if (head.y < 0) head.y = canvas.height - cellSize;

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreDisplay.textContent = `Score: ${score}`;
        food = {
          x: Math.floor(Math.random() * (canvas.width / cellSize)) * cellSize,
          y: Math.floor(Math.random() * (canvas.height / cellSize)) * cellSize,
        };
      } else {
        snake.pop();
      }

      // Check self collision
      for (const segment of snake) {
        if (segment.x === head.x && segment.y === head.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);
    }

    function drawGame() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawFood();
      drawSnake();
    }

    function gameLoop() {
      if (!isGameOver) {
        moveSnake();
        drawGame();
      }
    }

    function gameOver() {
      isGameOver = true;
      clearInterval(gameInterval);
      restartBtn.style.display = "inline-block";
    }

    restartBtn.addEventListener("click", initGame);

    // Controls
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if ((key === "arrowup" || key === "w") && direction !== "DOWN") direction = "UP";
      else if ((key === "arrowdown" || key === "s") && direction !== "UP") direction = "DOWN";
      else if ((key === "arrowleft" || key === "a") && direction !== "RIGHT") direction = "LEFT";
      else if ((key === "arrowright" || key === "d") && direction !== "LEFT") direction = "RIGHT";
    });

    // Start the first game
    initGame();
  </script>
</body>
</html>
